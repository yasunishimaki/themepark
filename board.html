<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地図に配置する | テーマパーク開園プロジェクト</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header compact">
    <div>
      <p class="eyebrow">◈ 配置操作 ◈</p>
      <h1>テーマパーク開園プロジェクト</h1>
    </div>
    <nav class="top-nav" aria-label="ページ">
      <a href="index.html">ホーム</a>
      <a href="view.html">議事録を見る</a>
    </nav>
  </header>

  <main class="board-layout">
    <!-- 3×3グリッド -->
    <section class="board-stage" aria-label="配置グリッド">
      <div class="game-grid" id="gameGrid"></div>
    </section>

    <!-- チップパレット -->
    <aside class="shop-tray" aria-label="配置チップ">
      <div class="tray-header">
        <h2>配置チップ</h2>
        <div class="tray-btns">
          <button class="tray-btn answer-btn" id="answerBtn" type="button">✅ 正解を見る</button>
          <button class="tray-btn" id="resetBtn" type="button">🔄 リセット</button>
        </div>
      </div>
      <div class="selected-status" id="selectedStatus">チップをクリックして選択</div>

      <!-- タブ -->
      <div class="palette-tabs">
        <button class="palette-tab active" data-tab="facility">施設チップ</button>
        <button class="palette-tab" data-tab="attraction">アトラクション</button>
      </div>

      <div class="card-palette" id="facilityPalette"></div>
      <div class="card-palette" id="attractionPalette" style="display:none"></div>

      <div class="board-tip">
        <strong>操作方法</strong><br>
        ① チップをクリック → 選択<br>
        ② マスをクリック → 配置<br>
        ③ 配置済みチップをクリック → 削除
      </div>
    </aside>
  </main>

  <!-- 正解モーダル -->
  <div class="modal-overlay" id="answerModal" role="dialog" aria-modal="true" aria-label="正解マップ">
    <div class="modal-box">
      <div class="modal-header">
        <h3>🗺️ 正解マップ（教員用）</h3>
        <button class="modal-close" id="modalClose" type="button" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <img src="完成図A.png" alt="テーマパーク完成図">
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    const STORAGE_KEY = "themepark-board-v2";

    // cellId → chipId[]  （施設・アトラクション混在）
    let placements = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let selectedChipId = null;
    let activeTab = "facility";

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(placements)); }

    // 施設チップとアトラクションチップを統合して検索
    function allChips() { return [...CHIPS, ...ATTRACTION_CHIPS]; }
    function chipById(id) { return allChips().find(c => c.id === id); }

    function cellIdForChip(chipId) {
      for (const [cellId, chips] of Object.entries(placements)) {
        if (chips.includes(chipId)) return cellId;
      }
      return null;
    }
    function isPlaced(chipId) { return cellIdForChip(chipId) !== null; }

    function setSelected(id) {
      selectedChipId = id;
      const chip = id ? chipById(id) : null;
      document.getElementById("selectedStatus").textContent =
        chip ? `${chip.icon} ${chip.name} を選択中` : "チップをクリックして選択";
      renderPalettes();
    }

    // ── チップ数に応じた枠線クラスを返す（③）──────────────
    function cellDepthClass(count) {
      if (count === 0) return "";
      if (count === 1) return "depth-1";
      if (count === 2) return "depth-2";
      return "depth-3";
    }

    // ─── グリッド描画 ─────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById("gameGrid");
      grid.innerHTML = "";
      GRID_CELLS.forEach(cell => {
        const el = document.createElement("div");
        el.className = "grid-cell" + (cell.fixed ? " fixed" : "");
        el.dataset.cellId = cell.id;

        const label = document.createElement("div");
        label.className = "cell-label";
        label.textContent = cell.label;
        el.appendChild(label);

        if (cell.fixed) {
          el.innerHTML += `
            <div class="cell-fixed-content">
              <span class="fixed-icon">${cell.fixedIcon}</span>
              <span class="fixed-name">${cell.fixedText}</span>
            </div>`;
        } else {
          const chipArea = document.createElement("div");
          chipArea.className = "cell-chips";
          chipArea.id = "chips-" + cell.id;
          el.appendChild(chipArea);
          el.addEventListener("click", () => onCellClick(cell.id));
        }

        grid.appendChild(el);
      });
      renderCellChips();
    }

    function renderCellChips() {
      GRID_CELLS.forEach(cell => {
        if (cell.fixed) return;
        const area = document.getElementById("chips-" + cell.id);
        const el   = document.querySelector(`[data-cell-id="${cell.id}"]`);
        if (!area || !el) return;

        area.innerHTML = "";
        const placed = placements[cell.id] || [];

        // ③ 枠線の太さで配置枚数をヒント
        el.classList.remove("depth-1", "depth-2", "depth-3");
        if (placed.length > 0) el.classList.add(cellDepthClass(placed.length));

        // 施設チップ（大）
        placed.filter(id => CHIPS.find(c => c.id === id)).forEach(chipId => {
          const chip = chipById(chipId);
          if (!chip) return;
          const div = document.createElement("div");
          div.className = "placed-chip";
          div.style.background = chip.color;
          div.innerHTML = `<span class="chip-icon-sm">${chip.icon}</span><span class="chip-name-sm">${chip.name}</span>`;
          div.title = chip.name + "（クリックで削除）";
          div.addEventListener("click", e => { e.stopPropagation(); removeChip(chipId, cell.id); });
          area.appendChild(div);
        });

        // アトラクションチップ（小・まとめて表示）
        const attrIds = placed.filter(id => ATTRACTION_CHIPS.find(c => c.id === id));
        if (attrIds.length > 0) {
          const wrap = document.createElement("div");
          wrap.className = "attr-wrap";
          attrIds.forEach(chipId => {
            const chip = chipById(chipId);
            if (!chip) return;
            const catMeta = ATTRACTION_CATEGORY_LABELS[chip.category];
            const span = document.createElement("span");
            span.className = "attr-chip";
            span.style.background = catMeta ? catMeta.color : "#888";
            span.textContent = chip.icon;
            span.title = chip.name + "（クリックで削除）";
            span.addEventListener("click", e => { e.stopPropagation(); removeChip(chipId, cell.id); });
            wrap.appendChild(span);
          });
          area.appendChild(wrap);
        }
      });
    }

    // ─── パレット描画（2タブ）────────────────────────────
    function renderPalettes() {
      renderFacilityPalette();
      renderAttractionPalette();
    }

    function renderFacilityPalette() {
      const palette = document.getElementById("facilityPalette");
      palette.innerHTML = "";
      CHIPS.forEach(chip => {
        const placed = isPlaced(chip.id);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "vcard" +
          (selectedChipId === chip.id ? " selected" : "") +
          (placed ? " placed" : "");
        btn.innerHTML = `<span class="vc-icon">${chip.icon}</span><span class="vc-name">${chip.name}</span>`;
        btn.title = placed ? "配置済み" : chip.name;
        btn.addEventListener("click", () => {
          if (placed) return;
          setSelected(selectedChipId === chip.id ? null : chip.id);
        });
        palette.appendChild(btn);
      });
    }

    function renderAttractionPalette() {
      const palette = document.getElementById("attractionPalette");
      palette.innerHTML = "";
      const categories = ["family", "night", "thrill"];
      categories.forEach(cat => {
        const meta  = ATTRACTION_CATEGORY_LABELS[cat];
        const chips = ATTRACTION_CHIPS.filter(c => c.category === cat);

        // カテゴリラベル
        const header = document.createElement("div");
        header.className = "attr-category-label";
        header.style.borderColor = meta.color;
        header.style.color = meta.color;
        header.textContent = meta.label;
        palette.appendChild(header);

        chips.forEach(chip => {
          const placed = isPlaced(chip.id);
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "vcard vcard-sm" +
            (selectedChipId === chip.id ? " selected" : "") +
            (placed ? " placed" : "");
          btn.innerHTML = `<span class="vc-icon">${chip.icon}</span><span class="vc-name">${chip.name}</span>`;
          btn.title = placed ? "配置済み" : chip.name;
          btn.addEventListener("click", () => {
            if (placed) return;
            setSelected(selectedChipId === chip.id ? null : chip.id);
          });
          palette.appendChild(btn);
        });
      });
    }

    // ─── 操作 ─────────────────────────────────────────
    function onCellClick(cellId) {
      if (!selectedChipId) return;
      const cell = GRID_CELLS.find(c => c.id === cellId);
      if (!cell || cell.fixed) return;
      if (isPlaced(selectedChipId)) return;

      if (!placements[cellId]) placements[cellId] = [];
      placements[cellId].push(selectedChipId);
      save();

      const el = document.querySelector(`[data-cell-id="${cellId}"]`);
      if (el) { el.classList.add("target-active"); setTimeout(() => el.classList.remove("target-active"), 400); }

      renderCellChips();
      setSelected(null);
    }

    function removeChip(chipId, cellId) {
      if (!placements[cellId]) return;
      placements[cellId] = placements[cellId].filter(id => id !== chipId);
      if (placements[cellId].length === 0) delete placements[cellId];
      save();
      renderCellChips();
      renderPalettes();
      if (selectedChipId === chipId) setSelected(null);
    }

    // ─── タブ切替 ─────────────────────────────────────
    document.querySelectorAll(".palette-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        document.querySelectorAll(".palette-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("facilityPalette").style.display   = activeTab === "facility"   ? "" : "none";
        document.getElementById("attractionPalette").style.display = activeTab === "attraction" ? "" : "none";
        setSelected(null);
      });
    });

    // ─── リセット ─────────────────────────────────────
    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("配置をすべてリセットしますか？")) return;
      placements = {};
      save();
      setSelected(null);
      renderCellChips();
      renderPalettes();
    });

    // ─── 正解モーダル ─────────────────────────────────
    const modal     = document.getElementById("answerModal");
    const answerBtn = document.getElementById("answerBtn");
    const closeBtn  = document.getElementById("modalClose");
    answerBtn.addEventListener("click", () => {
      if (!confirm("正解マップを表示しますか？\n（授業中は教員が確認してください）")) return;
      modal.classList.add("open");
    });
    closeBtn.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("open"); });

    // ─── 初期化 ───────────────────────────────────────
    renderGrid();
    renderPalettes();
    setSelected(null);
  </script>
</body>
</html>
